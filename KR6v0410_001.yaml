body:
  text: 鄞陳沂魯南著廬陵歐陽廕惟玉校金陵諸山在北者皆石負大江蟠踞都邑崖壁峻削高數十仞嶇關阻莫之可越西為城闉之限而石者亦多故隋置石頭城自北以東鍾山為都邑之鎮青龍黃鹿延亘於秣陵淳化者土石相半城南山多子石去十里外皆土不甚高惟牛頭山去城三十里石居土之十七僻奧而鬱秀兩峯立望之若牛頭然上有浮圖佛宮釋氏書云江左牛頭是也山之南五里有峯起相埒自麓至顛皆碧石被蘚藤樹雜糅與石相生崖之半一石窟曰獻花巖釋氏書謂唐釋師法融居此雪中有奇花又有鳥銜花之異巖因以名而山亦以巖顯故金陵稱叢林必曰牛首獻花巖祖堂而地實相連舊剎惟牛頭幽棲寺即今弘覺寺此巖惟僧菴耳皇明成化間山東僧古道師至巖下堅坐不動數年黔國之宰何公飯僧於祖堂之山北望雲氣被彩踄岡而北氣自巖出何公愕然步至巖見古道危坐問之不答而貌又古益怪異之是年即捐金為佛宮別治堂與之居請敕賜寺額曰花巖古道化去弟子再傳者曰德逹善弘教受祠部劄子領之踰年尋山之蹤窮水之源芟闢灌莽夷衍崎砠因高為臺緣曲為梯懸虛以為樓閣挹曠以為軒檻凡幽潛祕匿之所始畢張大榜之於木刊之於石何公之志至此益廣由是獻花巖之名大盛於牛頭山豫覽而奇之四年與諸大夫五宿山房踄歷甚遍考索彌詳因志其山石巖洞水泉臺甃官宇卉木異蓄各一章具載于篇題詠諸詩別附于後卷云志山石第一花巖山大藏經云山高千四百餘尺圍四十里餘三十步蓋巖之大山也山多奇石峻起為峯每登望至窮紆回復有高處至巔有土平丈數石如布席可坐江山四望可數百里南瞰姑熟宣歙西俯大江自浦口循三山至於天門牛渚映帶遠近東自天印絳巖諸山至於三茅起伏綿亘猶聚米然北望都城宮闕若畫朵地上歷歷在目惟江北諸山於鍾山之外隱隱數峯而已豫嘗登牛頭巔望之莫有及焉芙蓉峯在巖之東上數丈巨石聚若芙蓉然拱北峯芙蓉峯之上又百步有石巃嵸矗立北拱都邑因名亦以牛頭山形勢相背此特表出之耳天盤嶺巖之東界有嶺即山之右腢曰天盤或謂其高若盤空故名蓋祖堂北來之支脈也西風嶺巖之西界有嶺山之左腢也橫瞰大江北靣牛頭南俯祖堂雖於大山之高峻莫及而夷曠過之中峯西嶺之西而南緣崖二里許有僧廬於峯下又南向岡壟起伏蜿蜒微徑約三里至牛頭山中峯蓋兩山之中也志巖洞第二獻花巖佛宮之西去山領甚邇有石窟如室入深丈餘廣尋上石穹窿下平土無石神僧傳云唐貞觀十七年法融來修戒定二十一年巖下講法華經時素雪滿階獲奇花二莖狀如芙蓉燦同金色大藏經云又有百鳥銜花翔集即此巖也巖之外有石額題獻花巖三字蓋近時人立者伏虎洞巖之東上芙蓉峯下有石窟比巖差小亦云法融談經處嘗有二虎伺于門神蛇洞巖之西自徑而降草莽蒙翳中一石穴深不可測常有蛇出長丈餘目如星火相傳亦法融時之馴蛇也象鼻洞在神蛇洞之下石穴如象鼻相貫志水泉第三八孟塘山麓之北澤廣數十畝有橋其上以達山徑曰八孟塘意昔有孟氏溉田者也龜沖在塘之少東山坳間有泉出達于溪查塘堰在沖之下潴水處息泉入山徑歷上一里許有井其泉芳冽登者每疲輒息於此取飲之因名息泉有亭構于上淨香泉去息井又歷上數百步至玉板臺下有井大竹間曰淨香泉意取杜少陵雨洗涓涓淨風吹細細香之句太白泉在佛宮西香積厨前云古道師棲石室中有翁皓髯至前長揖曰吾椒金李也願效瓶鉢之供躍去百步忽不見師杖錫卓之泉湧出椒山顛也金西方之氣意為太白之精所舍也遂甃為井曰太白泉長庚池佛宮外歷上數十步過巖之西亦數十步有池水四時不涸味與太白泉不殊僧云波脈相通乃法融時所有者傳名長庚豈亦太白之意歟近復深浚丈餘周匝甃石有磴下可汲志臺甃第四息臺自山之北麓入徑皆石甃而上約一里平曠因山為臺躡者至此必息即息泉亭之上也小憩臺由息臺又歷上數百步少平因增廣方丈為臺布坐石而躡者得以少憩牛頭山之浮屠佛宮掩映樹間亦可坐玩也玉板臺自憩臺緣徑又數百步逶迤而上一巨臺臺下環以大竹因名玉板大觀臺從大竹傍少西縱步而上入石門臺廣數丈繚以短垣下瞰數仞羣峯平臨萬木俯視地之顯敞無踰於此大觀堂之前陛也瞰雲臺自入佛宮凡三歷石級至方丈又延蔓而上臺甃不可紀至拱北峯下有石削起平廣曰瞰雲臺澄江臺巖之西有微徑緣崖數十步至此平曠長江遠瞰如練藝臺巖之下一微徑至臺僅容席傍多藝草菩提臺藝臺下草莽中向西一高丘傍有菩提樹一株待月臺佛宮之東嶺有石臺曰待月東望曠迥月自下起蒼涼景色盡於此矣補衲臺下待月臺數步有石圍數丈敻起甚平四隅如劈判者具存可異曰補衲云亦法融補衣處也志宮宇第五佛宮入山麓微徑有石額曰出塵勝境乃緣崖而上約三四里至佛宮蓋山之半處也規制僅闢一山門朱其垣北向山門內之左右建樓二置鐘鼓中石甃數級上有天王殿四楹殿之後有大悲殿皆不甚崇廣然蓋覆盤據甚得構山之宜殿後又歷上有亭置修建之碑大宗伯李公本所撰文紀歲為成化丙午也僧居殿之右有堂曰選佛場歲有僧禪定于此殿之左曰香積廚諸僧會食處殿之後石級數仞上有堂曰白雲方丈欄檻出殿之上僧領寺者居之東有堂一區曰東退居蓋方丈之別院也方丈之左右各十數楹以棲衆僧屋皆負山右廬之前若干間以儲僧粟翠微房出方丈上長廊短檻制極古雅亦僧廬也宿星房又出翠微之上其制略同六觀亭宿星房西數步有亭六角名六觀蓋取釋氏如夢幻泡影露電如是觀之説也芙蓉閣亭之西芙蓉峯之下石谽谺懸出處嵌一閣因石之高下為棟之長短梯亦借石之紆轉處補甃而上規制極巧麗云一遊方僧手治者都庫部遊山記謂山之最佳處即此大觀堂大觀臺處堂啓數楹重櫳復檻僃幽寂顯敞之妙大夫士觀遊者多宿此息息所息臺處有堂曰息息所以登者至此必息金陵舊有勞勞亭而此曰息息所蓋不惟欲其息力也堂後有小室室傍有湢所茶厨皆以供遊人者僧德通嘗閉關于此延爽軒在方丈之西聳翠亭在拱北峯上羣峯聳出地之絶佳處也銀臺馮公命此名大書為額大宗伯喬公題白巖到此小篆四字紙為雲氣蒸濕又為大風揭之今額已不存矣歸雲亭入巖而東出數步至亭其制極宏麗樹石掩映可愛上有白巖公篆額中峯庵中峯下前後數十間僧古潭構以自居者極幽寂每自牛頭山來遊花巖者必經此少息林木深翳亦有不知者志卉木第六松檜山麓至佛宮松檜數萬株雜樹交植不可紀蓋自建寺時所植者大竹凡數百竿環植於玉板臺下大者可拱笋勝常味菩提樹在菩提臺下樹高丈餘有子結于葉上懸絲寸餘大如桐子貫其中可為計數珠山栗遍山皆有之秋來登眺僧旋取供客更助野况蕨山坡間甚多春來苗特出其端如拳色微紫可茹冬取根搗以水沃之其滓成粉熟之柔韌細滑比菉豆粉風味為勝大略似蓴羹也僧能自為之優曇葉山有草葉如柿黛色每葉上一英數出如茉莉然其色與葉不殊頗奇異好事者嘗求得之亦有不能得者僧益神其説云即優曇別種藝草莖叢生如邪蒿而香秋來細葉多粉如艾貯之衣篋書笥間可辟蠹古稱藝香即此藝臺傍多生之鼠刺山有草長二三尺徑幹多葉色光淨而方稜有刺若皂莢然亦可觀也志異蓄第七佛齒有齒長三寸徑寸之七方而稜色微碧齒端有紋如梵書復有竅含子如粟頗異僧以金刻龍首函之云佛齒內翰吳石樓有詩佛骨如拇指大數片色白質堅類寒水石僧云此佛骨然不可辨聞與齒皆自滇南受諸西域之僧已百年貯之金函觀者頗有興傅奕趙鳳之心者附獻花巖詩廬陵歐陽廕惟玉校遊獻花巖陳沂野寺逢人少山僧與世疏四禪惟有性六法本無書古洞棲蘿幌清泉引竹居懶融無復見丈室一燈餘登芙蓉閣次韻丹閣懸青磴浮雲宿處低俯窺寒鴈度欹聽曉猿啼瀑水侵雕檻飛蘿護絳題香臺在深處即此是曹溪大觀堂次韻飛蘿懸碧嶂回榭入丹霄閣瞑慈雲結林晴瑞露消目隨孤鳥盡心共片岑遙佛座鳴清磬惟聞下界飄別達僧出山次韻出郭本無意棲山似有緣道心融寶梵塵路厭華韉風鐸花香度雲牀葉影懸招提一回首人世隔蒼煙重遊獻花巖攀躋入蘿磴迢遞指花宮巖岫雲初斂樓臺雪未融院松添古色階竹改新叢往事頭俱白重來問遠公宿小星槎幽棲向飛閣高座恍虛槎迥含星動闌回傍月斜飄形御仙氣揮手拂天花未可投冠冕徒令羡出家宿達公房舊地人重宿勞生夢一醒亂峰明積雪虛殿納疏星僧髮老逾白佛燈寒更青翛然生道念對坐説金經登絶頂山頂捫蘿上風高兩腋輕大江橫禹甸重巘擁周京疆域連天盡煙雲接地平握圖傳令主瞻望不勝情宿寺次升之韻遠寺尋幽再結期同遊陶謝况能詩禪房一徑穿雲葉塵世三生感露葵山下夕陽人去靜水邊秋色鴈來遲知君觸法能參悟何必東林問遠師古臺秋晚客間憑渺渺寒原思不勝巗日乍沉鳴遠磬野煙初暝出疏燈山分僻路惟聞鳥寺轉空廊不見僧入境已離人世界此身還宿翠微層次吳太常韻愛山之癖吾自許山非吾來屬誰主花巖出郡三十程興到何曾擇晴雨一驢載裏三日糧惟斸笋蕨食盈筥那知列卿興更豪風雨亦不能終沮千盤百折到絶頂回首下方同一俯牛頭兩峯插雲標但覺飛鳥宿無所小山翁年八十強愛此徘徊幾延佇符臺養志極奉歡遍約群公共杯舉座中風雅發歌咏不作依依兒女語一時物與人意洽山影江光落天宇車塵愧不能相逐空餘想像勞心腑澄江臺葵丘王韋混合開天塹蒼茫壯帝畿帆檣移夕景樓殿動朝暉落日波濤隱浮煙島嶼微登臺歌古詠長憶謝玄暉芙蓉閣緣曲疑難至馮虛恐未安狻猊金鎖冷鸚鵡雪衣單竹倚琅玕聽雲移畫看如何翠微上猶自著塵冠宿寺次升之韻石牀留客滯歸期靈徹年來最愛詩坐饋清齋然曉竹吟揮輕箑製秋葵山中落葉俱飛蚤門外間雲欲散遲世事悠悠重如此擬將鉢去投師上方臺殿此難憑瑟瑟西風冷不勝雲起竹壇朝施食雨餘花梵晝傳燈高秋重臥他年客落日獨歸何處僧更欲攀躋巗塔上滿山松桂石層層奉陪司諫黃祠部諸君子遊獻花巖有作南郭肩輿曉共乘花開猶記昔年曾留題最憶同遊客問道還尋舊識僧每愛間身求小隱不妨病骨快高登明朝酒醒歸城市更逐塵勞恐不勝次吳太常韻結駟招提更誰許東南彥碩成賓主靈鷲銜花經幾秋至今散作空山雨行厨不用玉為盤山蔌溪毛薦筐筥振衣直與高寒期躡屐肯為嶄巖沮飛閣緣崖鐵鎖攀此時可仰不可俯勞勞陌上已無亭息息山中欣有所暫揮落日與徘徊却望間雲共凝佇吾翁浩歌叢桂篇風吹髯鬢飄然舉寂寥衆籟不敢鳴坐逼青霄聽鈴語牛山不礙長江流匹練西來亘寰宇何時共約佛圖澄盡挽波濤濯塵腑宿寺次升之韻吳郡顧璘遠從塵外結幽期馬首風煙憶舊詩絶壁啼猿多古木荒園栖蝶有殘葵山深落日逢人少路轉長林入寺遲總謂六朝禪誦地碧雲無處訪湯師翠壁丹臺豈厭憑西風寒露晚難勝雲中石影懸樵徑樹裏經聲見佛燈物象逈看殊世界禪心已覺近山僧不知捐佩重來日許借花宮第幾層冬日遊獻花巖風林下馬叩龍宮雪磴扶笻踏虎蹤把酒峰頭看海月開門庭際俯雲松鐘聲夜傍諸天動巖翠寒夜萬木濃若説移家身已老暫來猶自未從容宿寺寶應朱應登名山隔歲與心期古寺經過再賦詩僮僕解裝先藉草主僧客旋烹葵泉鳴澗壑秋生早樹隱房櫳日上遲豈獨有緣參法界同行吏部亦吾師長廊卷幔得間憑南國秋容望不勝香閣梵音傳遠磬石幢寒影護懸燈山深宜有長生藥寺古應多入定僧人語忽然飄下界始知身在白雲層曉自牛首望獻花巖聯句牛山信宿尚多情曉向花巖更問程應登下界日光疑世隔半天雲氣近天行沂自憐病骨緣崖怯轉覺秋懷入寺清璘共起題詩滿巖石摩挲寧獨感三生穆至花巖寺聯句天高地迥萬山開騁望龍宮坐不回衷真境獻靈花欲雨高僧傳偈鹿還來應登林穿石窟臨飛閣路入煙蘿接古臺沂况有醍醐相對飲一杯同洗十年埃牽與王考功欽佩華玉升之己巳歲重遊花巖宿大觀堂聯句四首溪口入松蘿沂危橋下馬過到門逢客少韋倚閣見山多興遠渾忘病璘心清漸伏魔徘徊遲華月應登延賞樂如何石徑緣雲上璘長林選樹休山深秋氣早應登洞古夕陽幽飛棟依巖起沂危闌擁砌周回頭望城市韋塵迹愧淹璘天宇澄無際應登秋生萬壑中雲歸巖樹斷沂月照石林空道念依蓮葉韋間情託桂叢浮生更何事璘擾擾逐飛蓬應登待月坐東嶺韋清光欲上遲開軒納秋色璘吹笛起涼颸諸品隨僧寂應登孤情與世違惟應珠樹鶴沂長與結幽期韋芙蓉閣萬壑蒼煙積顧諸天白日泜祗花秋自放朱靈鳥晝常啼撫景懷佳侶顧歡待後題眷茲巖洞杳朱何羡武陵溪顧小飲白雲方丈兩日山中坐塵心覺頓銷飢烏當食下顧驚雉去人遙把酒還餐菊朱詩謾折蕉從來戀丘壑顧終分老漁樵朱訪達上人不值落葉滿山寺顧禪僧初出關蒲團虛一榻朱竹戶鎖雙環久擬衣別顧何當乞食還道心方自悟朱玄論底須慳顧將出寺作乍與青山近顧翛然世味芳菲塵外相朱清淨佛前書欲去還憑檻顧重來擬卜居村墟寄花竹朱還似上皇餘顧宿小星槎上元許隚歲晚遊人少僧間盡掩扉背岩積雪高樹駐斜暉學道悲年長觀空悟昔非坐深法境滅盡日竟息歸披雲穿鳥道踏雪見狐蹤感舊悲長笛扶衰藉短笻霞光明舍利山色秀芙蓉欲借東林住湯師擬見容鐘定諸天寂山空孤月明不辭長夜飲欲盡故人情俯仰驚陳迹悲歡憶舊盟重來何日是塵世易紛更雪後登獻花巖躡屐尋幽不憚危亭臺隨處可詩風華迥與人間別山色偏於雪後奇花散諸天香雨細燈傳千載碧光遲情緣心事何年了巖下從師禮六時限韻太原喬宇兩峰餘秀結蒼巖巖畔花開色相兼選勝地多方外據逃禪心向醉中淹泉烹石乳香分鼎戶繞松枝翠入簾古寺南朝能幾見棲霞東指攝山尖次吳大常韻山遊一約衆即許符臺奉親實為主峰回牛首巖在南倣佛空花散飛雨山中選勝不一足坐列盤餐行載筥我亦平生愛登臨興到輒往誰復沮力穿龍窟險猶上腳踏鼇峰低可俯大如泰華小金焦江北江南固其所聞君山水解承歡金陵梵宮幾延佇列卿追陪擁冠蓋道傍嘖嘖稱盛舉獻壽南山歌頌多不是尋常燕遊語歸來為我道其事𨚫怪茲行惟少宇大篇強和謝山靈莫笑雕鎪費肝腑遊獻花巖丹徒楊紹方名山才一到世慮便云輕色相黃金界清虛白玉京寶花隨雨墜松障與雲平來去巖前鶴飛鳴漫有情宿大觀堂丹陽孫育入境塵緣淨登山步屧輕慈雲連法界佳氣擁神京階磴林中轉川原檻外平講堂同宿夜香供亦多情早秋登獻花巖秋高尋勝躡丹梯草樹蒼茫石徑微絶壁軒凌爽氣上方臺殿麗晴暉靜中清梵松風度象外真空花雨飛磴轉芙蓉峰頂處五雲平望盡王畿與思和遊獻花巖吳郡徐霖散睇目先豁窮躋心益開青山為誰好白髮屬吾來深遠入圖畫連寬酒杯夕陽促歸騎回首重徘徊遊花巖古濠沐嵩覽勝到巖巔江山偶劃然潭深龍穴靜樹古鶴巢穿去日驚林外飛雲繞殿前官間趂遊賞不暇問僧禪遊花巖定遠沐嶽嵯峩一剎聳高山殿角周回樹石間幽澗草香知麝過疏林日落見僧還及門先遣前呵徹題殿重將舊句刪帝釋不來天女去寶花無意獻塵寰陪劉尚寶扶侍遊獻花巖長洲吳一鵬牛山高高幾許今古何人作山主劉子迎親江左來紫翠叢中坐煙雨老氏斑衣春滿庭陸郎霜橘香生筥遠近山人皆走觀德色耰鋤幾慚沮對山三日捧霞觴拜獻一興還一俯借彼禪林選佛場為我符臺奉親所陶情更賴絲與簧年在桑榆好延佇席上公卿嘆賞餘至樂百年真盛舉東海應添仙屋籌南山敢效詩人語巋然公壽定無疆喜氣隨春溢眉宇宦遊南北縱驅馳長把牛山藏肺腑山遊果得天公許酒仍煩東道主一笑揚揚並馬行今日晴明昨陰雨緋桃留豔映疏巾青杏𭘧酸盛小筥天闕嵯峨望眼中牛首一名天闕山此興勃然誰復沮雲山排闥翠相迎野水繞田清可俯前朝廢寺古城隅金碧翬飛餘幾所尋春方欲恣遊遨解轡何妨少停佇東山墅賭謝安石北海尊開孔文舉天披圖畫萬峰攢樹隱管絃羣鳥語江東自昔號繁華第一禪林名海宇諸公賸有紀遊詩句句清新從肺腑觀佛骨久矣金𠎣氏遺骸尚儼然珍藏堪駭俗蟬蛻不知年江表誇希見滇南想祕傳傅韓嗟莫作俯首對爐煙次早入城曙色霏微出寺門蒼顏猶覺帶餘醺流螢溪如星度怪石林間似虎蹲幾樹藤蘿疑隱路數家雞犬自成村滿襟風露山行慣觸熱誰將褦襶論遊獻花巖景陵魯鐸清塵曉雨乍霏微落絮遊絲總不飛絶巘路通行委曲大江帆遠見依稀雲中絳閣初疑畫洞口青苔欲上衣擬借巖房留信宿隔林啼鳥謾催歸次吳太常韻牛首花巖景如許有美符卿遙作主星言速客更輿親天為清塵夜來雨溪毛野蓛紛采掇脆碧柔青積箱筥若翁與客興皆豪攀壁緣崖色無沮伐木鳴鶯歷窈深問梓尋橋看仰俯林幽花鳥不辨名壑轉煙霞各為所題名塔頂頗危升窺燈佛洞聊凝佇奇觀書葉詩屢成小憩班荊杯輒舉離離天際見帆來忽忽空中聽人語要知會合不尋常試指鄉山列寰宇坐來卿月在尊更吸清輝照肝肺次吳太常韻餘姚王守仁春尋指天闕煙霞渺何許雙峰久相連千巖暫來主浮屠刺中天飛閣凌風雨探秀澗阿人蘿陰息筐筥滅迹避塵纓商歌入深沮風磴仰捫歷淙壑屢窺俯梯雲躋石閣下榻得吾所釋子上方候鳴鐘出延佇頽景耀回盻層飈翼輕舉曖曖林芳暮冷冷石泉語清宵耿無寐峰月升煙宇會晤得良朋可以寫心腑次吳太常韻三衢徐文溥巨靈何年劈開天闕高如許我欲携屐作山主祝融為我先驅除掃重陰息淫雨春風拂衣帶草露濕筐筥嵐光𢃄日生殘雲隔林沮文軒逐隊各後先山花壓帽時欹俯暖風氤氳似欲醉神遊汙漫何底所浮圖空中高雙立行行我亦勞瞻佇須捫歷巉之石磴雙袖飄飄輕霞舉千丈峰頭一長嘯萬籟風生驚相語君不見白馬小兒昔渡江萬古浮雲散天宇我今安得解悟真乘人與之三年靣壁忘心腑羣公大手誇燕許擊竹豪吟忘賔主得句大呌山神驚揮毫落素飄風雨孤鶴啄煙忽飛去山僧洗研供茗莒我亦挺戈騷壇下距踊直前無卻沮况當絶頂望大荒千山萬壑眼中俯當時何人坐説法百鳥銜花獻其所蒼苔渺不可尋石上惆悵空復佇斗酒且作詩百篇玉盞生波不停舉醉來便即臥草茵靜聽古洞神龍語山中樂事殊未央疏林夕照凌層宇却怪馬蹄促我歸城闉擾擾還塵腑次吳太常韻吳江周用牛首之山在何許欲問明朝南道主誰遣紛紛江上雲化作蕭蕭夜來雨平明童子市中歸紫笋青芹動盈筥門前車馬不發座上賔客色皆沮當靣羣山頂可摩入耳清歌首先俯便欲移文訟雨師龍國何人在王所百壺聊用洗愁寂雙足那能慰延佇洞天窈窕懷小酉詩陳縱橫圖載舉長卿此興復不淺東向招招作吳語當今白日照塗泥坐見青春轉寰宇肯辦官曹十日間謾與山林論肺腑花巖戈陽汪偉萬松徑折誤東西絶頂方知下界低洞小恰留雲宿處竹深剛洗鶴來蹊原頭樵牧行堪數江上帆檣望不迷勝地三千勞夢想敢辭多病怯攀躋花巖偶成江東李熙再訪招提感舊遊茶瓜重為巳公雨晴江郭塵氛淨春入郊原草樹柔金剎何年開梵相白雲長日護山樓振衣欲盡登臨興直到華巖最上頭登盡牛山萬水低五雲遙望帝城西江流浩渺浮天濶石勢崢嶸與日齊金碧殿庭開畫障翠巖樓閣嵌丹梯地偏自覺塵心遠風景依稀似虎溪大觀堂升大觀兮凌青霄跨金鰲兮參泬寥俯鵬背兮遊逍遙揮八極兮捫斗杓發天籟兮聞雲韶觀衆妙兮形神超萬慮息兮惟寂欲羽化兮翛翛歸雲亭雲兮雲兮何心胡為歸兮山岑朝冉冉兮霧合夕黯黯兮嵐森晝明晦兮忽變化隨卷舒兮披幽襟千峰樹色不可辨滃然窪兮深復深巖有龍兮未躍終隨起兮為霖澄江臺鬱崔嵬兮高臺俯長江兮西來渺千里兮為塹羌地闢兮天開湛空明兮如練日將夕兮波頽風恬恬兮淨拭望孤嶼兮浮埃鼓中流兮安在感往事兮興哀獻花巖巖虛兮若室震空兮飛錫融來兮安禪苦空兮靣壁談玄兮花開點頭兮化石感百鳥兮有情總六觀兮無迹息泉幽泉咽兮泠泠鑿山麓兮清深遊人止兮病渴挽一勺兮如金既非貪兮亦非盜老融卓錫傳至今芙蓉閣石蹲蹲兮巃嵸憑飛閣兮如空棧勾連兮鬼鑿嵌山竇兮雲通望芙蓉兮若簇飄蘿蔦兮驚鴻聳翠亭矗千仞兮干霄濕空翠兮孤標跨蒼虬兮聞雲璈凌雄風兮青鸞招蕭史降兮吹玉簫秦女更奏雲中韶孤亭翼然世莫識翻笑坡老臺名超待月臺待月臺煙蘿數仞荒蒼苔金波溶溶猶似舊不見融老光徘徊昔從月下了殘經一聲清梵穿青冥江山不改臺不朽與今人邀對酒補衲臺日烜烜兮朝陽融師遠兮臺荒針化棘兮蘿𭘧雲片片兮飛裳想孤蹤兮何在矻千仞兮蒼蒼長庚池下有太白泉上有長庚池泉水甘不涸池水清漣漪清漣漪纓可濯十年塵土污京洛間來此地見清深云是昔年山鬼鑿庚星耿耿銀河秋北斗倒浸池西頭山空月皎萬籟寂源頭活水流不息秋日遊花巖林屋蔡羽花巖最絶頂下與人境懸峭壁下蒼霧飛梯入青天江影如秋毫吳楚浩無邊竹蔭不漏日翠厚常流煙隱隱藤蘿中金磬忽泠然東山動餘靄羣巘爭效妍空虛亦悽神還尋曲房眠主人棄客去獨負東林緣獻花巖上元謝承舉出郭二十里上山三百盤知名九齡曰乘老一來看紺殿爭多麗朱樓揭大觀經營翻世纍佛本半巖安遊獻花巖秣陵顧源緑鬢今朝酒青山舊日緣香雲連大地花雨諸天虎迹留深洞龍光映古禪尚憑何日暇同爾奉金𠎣古殿秋深野氣涼石燈如月照禪床隨緣豆鉢留清供任意花叢作妙香塵土半生皆是夢𩬆毛回首忽成霜來尋開士談空相苦海從今度有航大觀堂淮陰胡璉草堂方餉午石路已迎曛上剎行應到疏鐘坐復聞開堂虛得月下榻暖雲一切清心地松花靜夜焚獻花巖新喻黎龍石磴穿雲上山花𭘧雨開聽經慣猿鶴護榻老莓苔骨立金牛瘦雄飛紫鳳來十年還夙願今日醉新醅花巖寺江東羅輅隔年重到花巖寺劇賞還如初度來山色遠含千古秀洞門深向半巖開喬松鬱鬱啼靈鳥曲磴層層蔭碧苔况有高僧容借榻凡襟從此脫塵埃觀佛齒骨長洲吳子孝齒骨存餘教開函意愴然空門長寂寂留鎮已年年諦玩驚希得深藏問所傳夕陽回馬首浩歎下蒼煙花巖寺古滇何迪古寺尋幽處攀蘿入翠微鳥從霄漢沒僧向石橋歸玉露沾烏帽松花點素衣肩輿一回首西嶺下晴暉宿寺西岷山人趙琮跨蹇尋山寺花巖寄此宵僧房懸石壁燈影出林梢睡醒風塵夢鐘聞次第敲起看紅日上遙對兩峰高獻花巖濮陽李廷相融公萬丈巖遠在江之滸昔有獻花禽今無衛門虎歸雲亭尋幽坐翠微嵐氣濕人衣日暮高亭上雲歸僧未歸聳翠亭孤亭靣牛頭四望雲生嶺春深翠欲流坐久衣裳冷小星槎廬陵賀涇一𣲖銀河路未賒浮塵回首即仙家步間欲問支機石須向牛山覔舊槎芙蓉閣花作樓臺石作枝青山蓉閣兩爭奇開懷欲遣當興恰被千松落酒巵翠濤軒萬竹瀟瀟翠欲流清風披拂小亭幽可憐何處登仙子猶自吹簫跨鳳遊世生也晚不及侍先大父常常於手澤窺之自乞歸來家居者十三山居者十七至天闕獻花諸勝尤所染神曾作獻花巗志尋𢿱去好事者爭索之而不淂令後遊人作一話柄良足嘆也壬寅立秋日門人歐陽惟玉結社沈生豫西園生豫出前志以示為先大父手書者行犁然墨花藻潤共展閲間惟玉獨愛玩不忍去手蓋其生平矌淡神情既關山水而復棲託於筆硯於亡祖有真賞焉遂携此册校而鏤之為社中一大快事無何秋且杪同社從焦太史信宿於天闕侵晨過獻花巖太史度巉巗尋石上題咏手雪苔蘚並讀一過惟玉復裁赫蹄記之歸而次第附諸末簡浸浸乎為丘壑一杌乘也嗚呼以銷沉數十年者而一旦昭揭先大父不歿矣抑亦山靈不欲祕此奇事耶其徼於名賢之表章者多也癸卯夏孫弘世薰沐書
