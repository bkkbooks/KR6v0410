front:
  text: 獻花巖志序距都城南三十里有崇丘茂林曰獻花巖者唐融法師觀心處也與祖堂天閼綺錯而居登臨之美為一方最嘉靖中內翰石亭陳公遊而樂之攬筆為志流播於時去之二十載余讀書其地問之巖僧已無知者意嘗念之萬曆壬寅閒步西園沈君生予示公墨本手蹟若新同遊者相𮨇愕眙得未曾有於是歐陽惟玉請校刻之而属余為序夫公以雄詞奧學領袖玉堂其進於朝也掌帝制潤國猷卓爾以冠羣哲其遊於斯也暢天機栖顥氣翛然而遺萬物風華文采照耀林壑凡有識者疇不慕之矧是志也軼謝客之山居同楊衒之寺記使禪誦者知托遊矚者忘㱕固僧寮之名蹟舊都之勝事也傳其可後是歲秋仲余与公孫延之吳肅卿陳藎卿惟玉兄弟惟禮惟功葉循甫七人憩茲精藍迨於信宿下上巖谷消搖亭館陟高岡俯長江羣峰積翠以廻合楓葉流丹而映彂莫不懷昔賢之高蹈撫遺編而太息乃相与剔蘚捫蘿摩挲碑版取巖中賦詠裒而錄之并系卷末嗟乎內翰作之惟玉述之一則品題山川宗廟之琳瑯一則激揚材美東南之竹箭後有攷者其在斯言癸卯夏京兆焦竑弱矦書
